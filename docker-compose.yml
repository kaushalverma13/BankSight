version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: banksight_postgres
    environment:
      POSTGRES_DB: banksight_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banksight_network

  # BankSight Application
  app:
    build: .
    container_name: banksight_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banksight_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DEBUG: "False"
      LOG_LEVEL: INFO
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    networks:
      - banksight_network
    restart: unless-stopped

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: banksight_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - banksight_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  banksight_network:
    driver: bridge
