[pytest]
# Pytest configuration for BankSight

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Python files
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    fraud: Fraud detection tests
    analytics: Analytics tests
    database: Database tests

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
