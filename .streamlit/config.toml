[theme]
primaryColor = "#1f77e6"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f9fa"
textColor = "#000000"
font = "sans serif"

[client]
showErrorDetails = true
maxUploadSize = 1024

[server]
port = 8501
headless = true
runOnSave = true
logger.level = "info"

[logger]
level = "info"
messageFormat = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
